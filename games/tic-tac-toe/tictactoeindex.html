<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe | Arcade Portal</title>
    <link rel="stylesheet" href="tictactoe.css" />
  </head>
  <body>
    <!-- Selection Overlay -->
    <div id="selection-overlay" class="overlay">
      <div class="selection-card">
        <h2>Choose Your Side</h2>
        <div class="choice-group">
          <button id="choose-x" class="choice-btn">Cross (X)</button>
          <button id="choose-o" class="choice-btn">Circle (O)</button>
        </div>
        <h2>Select Difficulty</h2>
        <div class="choice-group">
          <button id="diff-medium" class="choice-btn diff-btn">Medium</button>
          <button id="diff-hard" class="choice-btn diff-btn active">Hard</button>
        </div>
        <button id="start-game" class="start-btn">Battle CPU</button>
      </div>
    </div>

    <a href="../../index.html" class="back-btn">← Back to Hub</a>
    
    <div class="msg-container hide">
      <p id="msg">Winner</p>
      <button id="new-btn">New Game</button>
    </div>
    
    <main class="game-container blur">
      <h1>Tic Tac Toe</h1>
      <div class="container">
        <div class="game">
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
        </div>
      </div>
      <button id="reset-btn">Reset Game</button>
    </main>
    <script src="tictactoe.js"></script>
  </body>
</html>
