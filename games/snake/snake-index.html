<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Snake | Arcade Portal</title>
    <link rel="stylesheet" href="snake-style.css">
</head>
<body>
    <a href="../../index.html" class="back-btn">← Back to Hub</a>
    
    <h1>Cyber-Snake</h1>
    
    <div class="stats">
        <div class="stat">Score: <span id="score">0</span></div>
        <div class="stat">High Score: <span id="high-score">0</span></div>
    </div>

    <div class="game-area">
        <canvas id="snakeGame" width="400" height="400"></canvas>
    </div>

    <div id="game-over" class="overlay hide">
        <div class="modal">
            <h2>System Crash</h2>
            <p>Score: <span id="final-score">0</span></p>
            <button id="restart-btn" class="start-btn">Re-initialize</button>
        </div>
    </div>

    <div class="controls-hint">
        Use Arrow Keys to Navigate
    </div>

    <script src="snake-app.js"></script>
</body>
</html>
