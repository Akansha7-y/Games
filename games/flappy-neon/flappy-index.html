<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Neon | Arcade Portal</title>
    <link rel="stylesheet" href="flappy-style.css">
</head>
<body>
    <a href="../../index.html" class="back-btn">← Back to Hub</a>
    
    <h1>Flappy Neon</h1>
    
    <div class="stats">
        <div class="stat">Score: <span id="score">0</span></div>
        <div class="stat">Best: <span id="high-score">0</span></div>
    </div>

    <div class="game-area">
        <canvas id="flappyCanvas" width="360" height="580"></canvas>
    </div>

    <div id="game-over" class="overlay hide">
        <div class="modal">
            <h2>Critical Failure</h2>
            <p>Score: <span id="final-score">0</span></p>
            <button id="restart-btn" class="start-btn">Re-Ignite Spark</button>
        </div>
    </div>

    <div class="controls-hint">
        Press [SPACE] or Click to Pulse
    </div>

    <script src="flappy-app.js"></script>
</body>
</html>
